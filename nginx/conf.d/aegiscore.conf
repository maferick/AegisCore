# AegisCore nginx reverse-proxy + PHP front-door config.
#
# Mounted read-only at /etc/nginx/conf.d/aegiscore.conf in the nginx container.
# Compose service names are resolvable on the `aegiscore` network:
#   php-fpm, opensearch, opensearch-dashboards, influxdb2, neo4j.
#
# Two public hostnames:
#   * winterco.killsineve.online  — full app, IP-restricted to the
#                                    operator (45.83.233.47) for now.
#   * killsineve.online           — public mirror; only /war-report
#                                    and its assets respond, everything
#                                    else 404s. No auth.
# Catch-all closes the connection so other hostnames pointed at this
# IP can't probe the app.
#
# TLS: this nginx is the public-facing termination point. Certs live
# at /etc/letsencrypt/live/<host>/{fullchain,privkey}.pem (mounted
# read-only from /opt/AegisCore/letsencrypt/etc). HTTP/80 only serves
# the ACME http-01 challenge + a 301 redirect to https.

# Trust localhost + docker bridges so $remote_addr reflects the real
# client IP for allow/deny rules. The container is itself the public
# TLS endpoint, so the only proxies in front of us are loopback /
# bridge — third-party CDNs would need additional set_real_ip_from.
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Modern TLS profile — Mozilla "intermediate" 2025. ECDSA + RSA
# fallback covered by the Let's Encrypt cert chain.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── HTTP (port 80) — ACME + redirect to HTTPS ─────────────────
# Both hostnames share this block. ACME challenge served plaintext;
# everything else 301s to HTTPS so users always land on TLS.
server {
    listen 80;
    listen [::]:80;
    server_name killsineve.online www.killsineve.online winterco.killsineve.online;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── winterco.killsineve.online — operator-only, full app (TLS) ─
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name winterco.killsineve.online;

    ssl_certificate     /etc/letsencrypt/live/winterco.killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winterco.killsineve.online/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # ACME also reachable on TLS (some validators retry over HTTPS).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # IP allow-list for the application surface. Operator-only for
    # now. Cert issuance/renewal stays public via the location above.
    location / {
        allow 45.83.233.47;
        deny all;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        allow 45.83.233.47;
        deny all;
        try_files $uri =404;
        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── killsineve.online — public mirror, war-report only (TLS) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name killsineve.online www.killsineve.online;

    ssl_certificate     /etc/letsencrypt/live/killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/killsineve.online/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Root → 302 to the war report. Convenience redirect; real
    # content lives at /war-report.
    location = / {
        return 302 /war-report;
    }

    # The one and only PHP-served path on this host.
    location = /war-report {
        try_files $uri /index.php?$query_string;
    }

    # Compiled / shipped static assets used by the page. Filament
    # injects a couple of CSS/JS files; allow the public asset tree
    # but route .php files only via the explicit allowlist above.
    location /css/      { try_files $uri =404; }
    location /js/       { try_files $uri =404; }
    location /fonts/    { try_files $uri =404; }
    location /images/   { try_files $uri =404; }
    location /storage/  { try_files $uri =404; }
    location = /favicon.ico { try_files $uri =404; }
    location = /robots.txt  { try_files $uri =404; }

    # PHP front controller — only invoked from /war-report and the
    # root redirect via Laravel's index.php fallback. All other
    # paths fall through to the catch-all below.
    location ~ ^/index\.php$ {
        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    # Anything not whitelisted above 404s without ever hitting PHP.
    location / {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── catch-all default ──────────────────────────────────────────
# Any other Host header (random IP probes, abuse scans, prior
# wildcard DNS records) gets 444 (close-without-response).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

# Catch-all on TLS — needs a cert to listen on 443 at all, so reuse
# the killsineve cert as a placeholder. Requests with mismatched SNI
# get closed.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/killsineve.online/privkey.pem;
    return 444;
}
