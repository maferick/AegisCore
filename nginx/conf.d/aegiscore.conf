# AegisCore nginx reverse-proxy config
#
# Mounted read-only at /etc/nginx/conf.d/aegiscore.conf in the nginx container.
# Services are reachable by their compose service name on the `aegiscore`
# network: opensearch, opensearch-dashboards, influxdb2, neo4j.

server {
    listen 80 default_server;
    server_name _;

    # Liveness probe used by the nginx healthcheck.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Catch-all landing page — replace when the PHP control plane is wired up.
    location / {
        add_header Content-Type text/plain;
        return 200 "AegisCore nginx is up. Configure vhosts in nginx/conf.d/.\n";
    }
}

