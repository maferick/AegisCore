# AegisCore nginx reverse-proxy + PHP front-door config.
#
# Mounted read-only at /etc/nginx/conf.d/aegiscore.conf in the nginx container.
# Compose service names are resolvable on the `aegiscore` network:
#   php-fpm, opensearch, opensearch-dashboards, influxdb2, neo4j.
#
# Two public hostnames:
#   * winterco.killsineve.online  — full app, IP-restricted to the
#                                    operator (45.83.233.47) for now.
#   * killsineve.online           — public mirror; only /war-report
#                                    and its assets respond, everything
#                                    else 404s. No auth.
# Catch-all closes the connection so other hostnames pointed at this
# IP can't probe the app.
#
# TLS: this nginx is the public-facing termination point. Certs live
# at /etc/letsencrypt/live/<host>/{fullchain,privkey}.pem (mounted
# read-only from /opt/AegisCore/letsencrypt/etc). HTTP/80 only serves
# the ACME http-01 challenge + a 301 redirect to https.

# Trust localhost + docker bridges so $remote_addr reflects the real
# client IP for allow/deny rules. The container is itself the public
# TLS endpoint, so the only proxies in front of us are loopback /
# bridge — third-party CDNs would need additional set_real_ip_from.
# gzip — large-ish HTML pages (war-report ~790 KB) compress to under
# 100 KB. brotli would do better but isn't in the stock alpine
# nginx build; gzip is the no-rebuild win.
gzip on;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_vary on;
gzip_proxied any;

set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# ── WAF — pattern-based attack rejection (SQLi / XSS / LFI / RCE) ──
# Without ModSecurity (alpine nginx doesn't ship it), do pattern
# matching at the http level via map directives. The maps inspect
# the request URI, query args, and User-Agent. A non-empty match
# value is checked at request time inside the public vhost — when
# any of these is "1" we 403 the request.
#
# These maps are intentionally conservative: false positives on a
# read-only public site are far worse than missing exotic payloads.
# The Laravel app behind this is hardened independently (PDO
# parameterised queries everywhere, Blade auto-escaping, CSP).
# This layer is belt-and-suspenders for tool-driven scans.

# SQL injection — union/select, comment markers, sleep/benchmark
# functions, common dump probes. case-insensitive (~*).
map $request_uri $waf_sqli {
    default 0;
    "~*\bunion[\s\+/\*]+select\b"      1;
    "~*\b(?:select|insert|update|delete|drop|alter|create|exec)[\s\+/\*]+(?:from|into|table|database)\b"  1;
    "~*\binformation_schema\b"         1;
    "~*\bbenchmark\s*\("               1;
    "~*\bsleep\s*\(\s*\d"              1;
    "~*\bload_file\s*\("               1;
    "~*\bouter\s+xml\b"                1;
    "~*--\s*$"                         1;
    "~*\b(?:0x[0-9a-f]{8,}|char\(\d+\))\b" 1;
}
map $args $waf_sqli_args {
    default 0;
    "~*\bunion[\s\+/\*]+select\b"      1;
    "~*\b(?:select|insert|update|delete|drop)[\s\+/\*]+(?:from|into|table)\b"  1;
    "~*\binformation_schema\b"         1;
    "~*\bbenchmark\s*\("               1;
    "~*\bsleep\s*\(\s*\d"              1;
    "~*\bor\s+1=1\b"                   1;
    "~*'\s*or\s*'1'='1"                1;
}

# XSS / HTML injection
map $request_uri $waf_xss {
    default 0;
    "~*<\s*script\b"                   1;
    "~*\bjavascript\s*:"               1;
    "~*\bon(?:load|error|click|mouseover|focus|blur)\s*="  1;
    "~*<\s*(?:iframe|object|embed|svg|img)\b"  1;
}
map $args $waf_xss_args {
    default 0;
    "~*<\s*script\b"                   1;
    "~*\bjavascript\s*:"               1;
    "~*\bon(?:load|error|click|mouseover|focus|blur)\s*="  1;
}

# LFI / path traversal / RFI / shell wrappers
map $request_uri $waf_lfi {
    default 0;
    "~*\.\./\.\./"                     1;
    "~*/etc/(?:passwd|shadow|hosts|group)\b"  1;
    "~*/proc/self/"                    1;
    "~*\b(?:php|file|data|expect|zip|phar|glob)://"  1;
    "~*\b/\.(?:env|git/config|svn/entries|aws/credentials)\b" 1;
    "~*\bwp-(?:admin|login|content|includes)\b"  1;
    "~*\.(?:php|asp|aspx|jsp|cgi|bak|swp|sql|env|ini|conf|log)$"  1;
}

# Bad-bot / tool fingerprints
map $http_user_agent $waf_bad_ua {
    default 0;
    "~*sqlmap"                         1;
    "~*nikto"                          1;
    "~*acunetix"                       1;
    "~*nessus"                         1;
    "~*nmap"                           1;
    "~*masscan"                        1;
    "~*havij"                          1;
    "~*libwww-perl"                    1;
    "~*python-requests/2\.[0-9]\."     1;  # outdated Python scanners
    "~*go-http-client"                 1;  # generic Go scanners
    "~*(?:^|\s)curl/[0-7]\."           1;  # ancient curl, real users on >=8
    ""                                 1;  # empty UA → bot/scanner
}

# Method allow-list — public site only needs GET/HEAD/POST. TRACE,
# TRACK, OPTIONS, PUT, DELETE etc. on the public mirror are noise.
map $request_method $waf_method_ok {
    default 0;
    GET     1;
    HEAD    1;
    POST    1;
}

# Rate limiting — per-IP shared zone. 30 req/s with a 30 burst is
# generous for normal browsing (a war-report page fires ~25 image
# subrequests) but blunts scanner sprays cold.
limit_req_zone $binary_remote_addr zone=killsineve_rps:16m rate=30r/s;
# Stricter zone for /index.php specifically — never legitimately
# pounded faster than 5 req/s by a real visitor.
limit_req_zone $binary_remote_addr zone=killsineve_php:8m  rate=5r/s;
# Connection limiter — ban anyone holding > 50 concurrent conns.
limit_conn_zone $binary_remote_addr zone=killsineve_conn:8m;

# Custom log format with the real client IP up front — fail2ban
# parses the leading address. Standard combined format otherwise.
log_format waf_log '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

# Modern TLS profile — Mozilla "intermediate" 2025. ECDSA + RSA
# fallback covered by the Let's Encrypt cert chain.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── HTTP (port 80) — ACME + redirect to HTTPS ─────────────────
# Both hostnames share this block. ACME challenge served plaintext;
# everything else 301s to HTTPS so users always land on TLS.
server {
    listen 80;
    listen [::]:80;
    server_name killsineve.online www.killsineve.online winterco.killsineve.online;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── winterco.killsineve.online — operator-only, full app (TLS) ─
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name winterco.killsineve.online;

    ssl_certificate     /etc/letsencrypt/live/winterco.killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/winterco.killsineve.online/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    # Hardening — winterco vhost (full Filament + Livewire app).
    # CSP intentionally not enforced here: Filament + Livewire emit
    # inline scripts/styles + Alpine bindings that a strict CSP would
    # break; the IP allowlist is the primary control for this surface.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    root /var/www/html/public;
    index index.php index.html;


    # ACME also reachable on TLS (some validators retry over HTTPS).
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # IP allow-list for the application surface. Operator-only for
    # now. Cert issuance/renewal stays public via the location above.
    location / {
        allow 45.83.233.47;
        deny all;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        allow 45.83.233.47;
        deny all;
        try_files $uri =404;
        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── killsineve.online — public mirror, war-report only (TLS) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name killsineve.online www.killsineve.online;

    ssl_certificate     /etc/letsencrypt/live/killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/killsineve.online/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    # Hardening — public mirror is mostly static HTML + inline CSS.
    # Only same-origin scripts (currently /js/war-quotes.js for the
    # rotating war-quote ribbon) — no 'unsafe-inline' / 'unsafe-eval'.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://killsineve.online https://images.evetech.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://login.eveonline.com; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Permissions-Policy "interest-cohort=(), geolocation=(), camera=(), microphone=()" always;

    root /var/www/html/public;
    index index.php index.html;

    # ── WAF — pattern-based reject. The maps live at http-level
    # (top of this file). Each `if` here checks one map and returns
    # 403 if the pattern hit. Order matters: most specific first
    # so the access log shows the precise reason. Method allow-list
    # returns 405 instead of 403 for clarity. ACME + health are
    # exempt because they sit in their own location blocks above
    # which match before these server-level ifs run on /index.php.
    if ($waf_method_ok = 0) {
        return 405;
    }
    if ($waf_sqli) {
        return 403;
    }
    if ($waf_sqli_args) {
        return 403;
    }
    if ($waf_xss) {
        return 403;
    }
    if ($waf_xss_args) {
        return 403;
    }
    if ($waf_lfi) {
        return 403;
    }
    if ($waf_bad_ua) {
        return 403;
    }

    # Per-IP concurrency cap — anyone holding > 50 simultaneous
    # connections to the public mirror is a tool, not a browser.
    limit_conn killsineve_conn 50;
    # Burst absorbs the natural multi-fetch when a war-report page
    # paints (~25 image subrequests fired together). nodelay so legit
    # traffic doesn't queue.
    limit_req zone=killsineve_rps burst=60 nodelay;

    # Custom access log capturing real IP + UA for fail2ban or any
    # downstream auditing.
    access_log /var/log/nginx/killsineve_access.log waf_log;
    error_log  /var/log/nginx/killsineve_error.log warn;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Root → 302 to the war-report landing.
    location = / {
        return 302 /war-report;
    }

    # War-report landing + scoped per-conflict reports.
    location = /war-report {
        try_files $uri /index.php?$query_string;
    }
    location ~ ^/war-report/vs-(imperium|initiative)$ {
        try_files $uri /index.php?$query_string;
    }
    location ~ ^/war-report/vs-(imperium|initiative)/me/killboard$ {
        try_files $uri /index.php?$query_string;
    }
    location ~ ^/war-report/vs-(imperium|initiative)/(me|me-loading|logout)$ {
        try_files $uri /index.php?$query_string;
        # /me cold-builds across the war's full killmail set (5+ months
        # for vs-initiative). The temp-table prime + percentile
        # distributions can run 30-90s on a cold cache. Bump the
        # FastCGI read timeout above the default 60s so nginx waits
        # for PHP to finish instead of 504-ing.
        fastcgi_read_timeout 180s;
    }
    # EVE SSO entry + callback for the public war-stats flow.
    location = /auth/eve/war-stats {
        try_files $uri /index.php?$query_string;
    }
    location = /auth/eve/callback {
        try_files $uri /index.php?$query_string;
    }

    # Battle theaters + killmail detail — public read-only routes
    # already exist (PublicBattlesController / PublicKillmailsController).
    # Hostname allow-list pulls them in as the war-report's drilldown
    # surface so the running banner / leaderboards / structure timeline
    # can deep-link without leaving killsineve.online.
    location = /battles {
        try_files $uri /index.php?$query_string;
    }
    # Scoped lists (/battles/vs-imperium, /battles/vs-initiative) +
    # individual battle detail (/battles/{slug-or-id}). Slug regex
    # is permissive here; controller validates and 404s.
    location ~ ^/battles/[A-Za-z0-9\-]+$ {
        try_files $uri /index.php?$query_string;
    }
    # Per-side full pilot list — /battles/{slug-or-id}/pilots/{a|b|c}
    location ~ ^/battles/[A-Za-z0-9\-]+/pilots/[abc]$ {
        try_files $uri /index.php?$query_string;
    }
    location ~ ^/kills/[0-9]+$ {
        try_files $uri /index.php?$query_string;
    }
    # Local-cached EVE imagery proxy — keeps every icon one hop away
    # from CCP and lets nginx + browsers cache aggressively. Icons are
    # immutable per (entity, id) — Cache-Control 30d so the browser
    # stops re-asking after the first paint.
    location ~ ^/img/(type|character|alliance|corporation)/[0-9]+$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri /index.php?$query_string;
    }

    # Compiled / shipped static assets used by the page. Filament
    # injects a couple of CSS/JS files; allow the public asset tree
    # but route .php files only via the explicit allowlist above.
    # Cache-Control 7d on text assets, 30d on fonts/images — hash
    # busting in the URL handles invalidation.
    location /css/      { expires 7d;  add_header Cache-Control "public, max-age=604800" always; try_files $uri =404; }
    location /js/       { expires 7d;  add_header Cache-Control "public, max-age=604800" always; try_files $uri =404; }
    location /fonts/    { expires 30d; add_header Cache-Control "public, max-age=2592000, immutable" always; try_files $uri =404; }
    location /images/   { expires 30d; add_header Cache-Control "public, max-age=2592000" always; try_files $uri =404; }
    location /storage/  { expires 7d;  add_header Cache-Control "public, max-age=604800" always; try_files $uri =404; }
    location = /favicon.ico { expires 30d; add_header Cache-Control "public, max-age=2592000" always; try_files $uri =404; }
    location = /robots.txt  { try_files $uri =404; }

    # PHP front controller — only invoked from /war-report and the
    # root redirect via Laravel's index.php fallback. All other
    # paths fall through to the catch-all below.
    location ~ ^/index\.php$ {
        # PHP front controller is the only path that hits Laravel.
        # Apply a stricter rate limit here than the per-server cap —
        # 5 req/s with a 20 burst keeps the attack surface small.
        limit_req zone=killsineve_php burst=20 nodelay;

        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        # Bumped from 60s → 180s so the /me cold-build (war-effort
        # query across 5+ months of attacker rows) doesn't 504 on
        # first hit. Subsequent /me hits read from the per-character
        # cache and return in <50ms.
        fastcgi_read_timeout 180s;
    }

    # Anything not whitelisted above 404s without ever hitting PHP.
    location / {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── catch-all default ──────────────────────────────────────────
# Any other Host header (random IP probes, abuse scans, prior
# wildcard DNS records) gets 444 (close-without-response).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Docker healthcheck hits 127.0.0.1/health and the Host header doesn't
    # match any configured vhost — it lands here. Without an explicit /health
    # location the request would 444 and the container reports "unhealthy"
    # despite serving real traffic just fine. Whitelist this one path. Note:
    # `return` at server scope fires before location matching, so the catch-
    # all close-without-response has to live inside `location /` rather than
    # at server level — otherwise it shadows the /health match.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 444;
    }
}

# Catch-all on TLS — needs a cert to listen on 443 at all, so reuse
# the killsineve cert as a placeholder. Requests with mismatched SNI
# get closed.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;
    ssl_certificate     /etc/letsencrypt/live/killsineve.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/killsineve.online/privkey.pem;
    return 444;
}
