# AegisCore nginx reverse-proxy + PHP front-door config.
#
# Mounted read-only at /etc/nginx/conf.d/aegiscore.conf in the nginx container.
# Compose service names are resolvable on the `aegiscore` network:
#   php-fpm, opensearch, opensearch-dashboards, influxdb2, neo4j.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Container-side path. `app/` on the host is bind-mounted to /var/www/html
    # by the compose file, so this resolves to <AEGISCORE_ROOT>/app/public.
    # Don't change this to a host path — nginx runs inside the container.
    root /var/www/html/public;
    index index.php index.html;

    # Liveness probe used by the nginx healthcheck. Stays static — no PHP hop.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Route everything else through the PHP front controller.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    # Deny dotfiles (but allow .well-known for ACME challenges later).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

