; AegisCore custom PHP settings.
; Loaded from /usr/local/etc/php/conf.d/aegiscore/aegiscore.ini in the container.

memory_limit         = 2G
post_max_size        = 32M
upload_max_filesize  = 32M
; Bumped to match nginx fastcgi_read_timeout for /index.php (180s)
; so the /war-report/{c}/me cold-build can finish without a fatal
; PHP timeout. Subsequent /me hits use the per-character cache so
; this ceiling rarely matters in steady-state.
max_execution_time   = 180

date.timezone        = UTC

; Errors go to stderr (container logs); never surface them in HTTP responses.
display_errors       = Off
display_startup_errors = Off
log_errors           = On
error_log            = /dev/stderr
error_reporting      = E_ALL

; Hide PHP version from HTTP headers.
expose_php           = Off

; OPcache — tuned for 32c/125GB host. Phase-1 conservative defaults
; were here; superseded by infra/php/zz-aegiscore-opcache.ini baked
; into the image (loads at zz-aegiscore-opcache.ini, sorts before
; zz-aegiscore.ini so we'd shadow the image overrides). Keep just
; the keys we genuinely want different from the image (CLI off so
; tinker doesn't fight the cache).
opcache.enable                = 1
opcache.enable_cli            = 0
opcache.validate_timestamps   = 1
