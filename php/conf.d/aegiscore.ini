; AegisCore custom PHP settings.
; Loaded from /usr/local/etc/php/conf.d/aegiscore/aegiscore.ini in the container.

memory_limit         = 256M
post_max_size        = 32M
upload_max_filesize  = 32M
max_execution_time   = 60

date.timezone        = UTC

; Errors go to stderr (container logs); never surface them in HTTP responses.
display_errors       = Off
display_startup_errors = Off
log_errors           = On
error_log            = /dev/stderr
error_reporting      = E_ALL

; Hide PHP version from HTTP headers.
expose_php           = Off

; OPcache — keep JIT off for Phase 1; revisit when we profile a real workload.
opcache.enable                = 1
opcache.enable_cli            = 0
opcache.memory_consumption    = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps   = 1
opcache.revalidate_freq       = 2
