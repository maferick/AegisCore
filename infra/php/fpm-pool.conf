; AegisCore FPM pool overrides. Upstream php:8.4-fpm-alpine defaults to
; pm.max_children=5 which is fine for hello-world but not a Filament
; admin + Livewire portal with ~15-30 concurrent browser sessions on a
; 125GB host. Scale up dynamic pool so /admin + /portal stop queuing.

[www]
pm = dynamic
pm.max_children = 40
pm.start_servers = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12
pm.max_requests = 500
