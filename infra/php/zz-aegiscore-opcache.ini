; AegisCore OPcache + perf tuning. Hardware budget: 32 cores, 125GB RAM,
; ~65GB free. Defaults shipped with php:8.4-fpm-alpine assume a small VPS;
; we have headroom and Filament + Livewire have a long opcache-eligible
; surface, so bump everything to comfortable levels.

; ── OPcache memory ──────────────────────────────────────────────
; 128MB default fills up fast on a Laravel+Filament+Livewire+Horizon
; surface. 512MB leaves headroom for compiled blade views.
opcache.memory_consumption = 512

; Default 10k easily exceeded by vendor + Filament + Livewire combined.
; 50k covers the whole tree comfortably.
opcache.max_accelerated_files = 50000

; Interned strings (class/method names dedup'd in opcache RAM).
opcache.interned_strings_buffer = 32

; ── Freshness / I/O ─────────────────────────────────────────────
; Default 2s = stat() every PHP file every 2s. Cheap on SSD but
; pointless in production where deploys go through `make update` /
; image rebuild. 60s is plenty; cache:clear hooks remain authoritative.
opcache.revalidate_freq = 60

; Cache file paths so Laravel's heavy require_once chains don't re-stat.
realpath_cache_size = 8M
realpath_cache_ttl = 600

; ── JIT ─────────────────────────────────────────────────────────
; Tracing JIT — best for the long-running Livewire request paths
; that re-enter the same component code thousands of times.
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; Validate timestamps in dev, keep on in prod for now (rebuild will
; flush opcache anyway). Set to 0 only if a hot-deploy script clears
; opcache via cachetool / FPM reload.
opcache.validate_timestamps = 1

; ── Process / memory ────────────────────────────────────────────
; memory_limit already 2G in base image; no change needed.
