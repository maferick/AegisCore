name: aegiscore-stack

services:
  mariadb:
    image: mariadb:lts
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      MARIADB_USER: "${MARIADB_USER:-aegiscore}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/data:/var/lib/mysql
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/config:/etc/mysql/conf.d
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/logs:/var/log/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [aegiscore]

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      cluster.name: opensearch-cluster
      node.name: opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Security plugin off for phase 1: OpenSearch is only reachable on the
      # internal `aegiscore` network (host port 9200 is dev-only). The demo
      # config's self-signed TLS breaks APOC→OpenSearch calls from Neo4j and
      # adds friction with no matching security gain inside the compose net.
      # Put OpenSearch behind nginx + mTLS (or re-enable the plugin) in prod.
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/opensearch/data:/usr/share/opensearch/data
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/opensearch/logs:/usr/share/opensearch/logs
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fs http://localhost:9200/_cluster/health || exit 1"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [aegiscore]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      # Mirror the opensearch service: no security plugin, plain HTTP.
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks: [aegiscore]

  influxdb2:
    image: influxdb:2.7
    container_name: influxdb2
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_USERNAME}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG:-aegiscore}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET:-primary}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/influxdb2/data:/var/lib/influxdb2
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/influxdb2/config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [aegiscore]

  neo4j:
    image: neo4j:2026.03-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc","graph-data-science","apoc-extended"]'
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INIT:-2G}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-2G}"
      NEO4J_dbms_memory_transaction_total_max: "${NEO4J_TX_TOTAL_MAX:-2G}"
      NEO4J_db_memory_transaction_max: "${NEO4J_TX_MAX:-512M}"
      NEO4J_gds_validate__using__max__memory__estimation: "true"
      NEO4J_gds_progress__tracking__enabled: "true"
      NEO4J_db_transaction_timeout: "600s"
      NEO4J_server_bolt_thread__pool__min__size: "4"
      NEO4J_server_bolt_thread__pool__max__size: "16"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/data:/data
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/logs:/logs
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/import:/import
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [aegiscore]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    command:
      - "sh"
      - "-c"
      - 'exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru'
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/redis/data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [aegiscore]

  # Shared config for PHP containers (php-fpm + scheduler). YAML anchor lives
  # on php-fpm; scheduler merges it with `<<: *php-common`. Any new PHP-side
  # worker (future Horizon container, queue isolation, etc.) merges the same
  # anchor so env + volumes can't drift between planes by accident.
  php-fpm: &php-common
    image: aegiscore/php-fpm:0.1.1
    build:
      context: ./php
      dockerfile: Dockerfile
    # Always build locally; never try to pull from a registry. This image
    # does not exist on Docker Hub — it's assembled from infra/php/Dockerfile.
    pull_policy: build
    container_name: php-fpm
    restart: unless-stopped
    environment:
      # Exposed to PHP via getenv() / $_ENV; keep this list intentional.
      # ---------------------------------------------------------------
      # Laravel core
      # ---------------------------------------------------------------
      APP_NAME: AegisCore
      APP_ENV: "${AEGISCORE_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info

      # Mirror for non-Laravel code (config/aegiscore.php).
      AEGISCORE_ENV: "${AEGISCORE_ENV:-dev}"

      # ---------------------------------------------------------------
      # MariaDB (Laravel DB_* convention, sourced from infra MARIADB_*)
      # ---------------------------------------------------------------
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # ---------------------------------------------------------------
      # Redis (Laravel cache / sessions / queues / Horizon)
      # ---------------------------------------------------------------
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      # ---------------------------------------------------------------
      # Derived stores (our conventions, read via config/aegiscore.php)
      # ---------------------------------------------------------------
      # Security plugin disabled on the opensearch service — no auth, HTTP only.
      OPENSEARCH_HOST: "http://opensearch:9200"
      INFLUXDB_HOST: "http://influxdb2:8086"
      INFLUXDB_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      INFLUXDB_ORG: "${INFLUXDB_ORG:-aegiscore}"
      INFLUXDB_BUCKET: "${INFLUXDB_BUCKET:-primary}"
      NEO4J_HOST: "bolt://neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"

      # ---------------------------------------------------------------
      # EVE SSO — login.eveonline.com OAuth2 PKCE
      # ---------------------------------------------------------------
      # Read by config/eve.php → consumed by App\Services\Eve\Sso\EveSsoClient.
      # When client_id / secret / callback_url are all present, the "Log in
      # with EVE Online" button renders on the landing page + Filament admin
      # login form + admin user menu. Empty values hide the button entirely
      # (EveSsoClient::isConfigured() returns false), which is the correct
      # behaviour for fresh installs that haven't registered an EVE app yet.
      EVE_SSO_CLIENT_ID: "${EVE_SSO_CLIENT_ID:-}"
      EVE_SSO_CLIENT_SECRET: "${EVE_SSO_CLIENT_SECRET:-}"
      EVE_SSO_CALLBACK_URL: "${EVE_SSO_CALLBACK_URL:-}"
      EVE_SSO_LOGIN_SCOPES: "${EVE_SSO_LOGIN_SCOPES:-publicData}"
      # Service character SSO scopes — the elevated set the admin grants
      # via /admin/eve-service-character. Default in config/eve.php; see
      # .env.example for the expanded form. Empty disables the flow.
      EVE_SSO_SERVICE_SCOPES: "${EVE_SSO_SERVICE_SCOPES:-}"
      # Comma-separated EVE character IDs that get Filament /admin access.
      # IDs (not names) — names are mutable, IDs are not. See ADR-0002.
      EVE_SSO_ADMIN_CHARACTER_IDS: "${EVE_SSO_ADMIN_CHARACTER_IDS:-}"
      # Donations character (third SSO flow) — single in-game character
      # that receives ISK donations. The poller hits its wallet journal
      # on EVE_DONATIONS_POLL_CRON cadence and records player_donation
      # entries. Empty CHARACTER_ID disables both the SSO flow + the
      # poller. See ADR-0002 § phase-2 amendment + .env.example.
      EVE_SSO_DONATIONS_CHARACTER_ID: "${EVE_SSO_DONATIONS_CHARACTER_ID:-}"
      EVE_SSO_DONATIONS_CHARACTER_NAME: "${EVE_SSO_DONATIONS_CHARACTER_NAME:-}"
      EVE_SSO_DONATIONS_SCOPES: "${EVE_SSO_DONATIONS_SCOPES:-publicData esi-wallet.read_character_wallet.v1}"
      EVE_DONATIONS_POLL_CRON: "${EVE_DONATIONS_POLL_CRON:-*/5 * * * *}"
      # ISK-per-ad-free-day rate (DonorBenefitCalculator). Default
      # 100_000 ISK = 1 day. Change requires a one-off
      # `php artisan eve:donations:recompute` run — the poller itself
      # only recomputes for donors whose new donations it processes.
      EVE_DONATIONS_ISK_PER_DAY: "${EVE_DONATIONS_ISK_PER_DAY:-100000}"

      # ---------------------------------------------------------------
      # Docker monitoring — tecnativa/docker-socket-proxy
      # ---------------------------------------------------------------
      # URL the DockerStatusService hits for read-only /containers data
      # backing /admin/container-status. Empty string disables the page
      # (DockerStatusService::probe returns UNKNOWN and the widget
      # renders a "not configured" notice). See config/aegiscore.php
      # and the docker_socket_proxy service below for the threat model.
      DOCKER_API_HOST: "${DOCKER_API_HOST:-http://docker_socket_proxy:2375}"
      DOCKER_API_TIMEOUT_SECONDS: "${DOCKER_API_TIMEOUT_SECONDS:-2}"

      # ---------------------------------------------------------------
      # ESI — esi.evetech.net (light synchronous calls only on this plane)
      # ---------------------------------------------------------------
      # CCP requires a User-Agent identifying app + contact. Reactive
      # rate-limit throttle (App\Services\Eve\Esi\EsiRateLimiter) reads
      # the safety_margin / max_wait knobs; defaults match config/eve.php.
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"
      ESI_TIMEOUT_SECONDS: "${ESI_TIMEOUT_SECONDS:-10}"
      ESI_RATE_LIMIT_SAFETY_MARGIN: "${ESI_RATE_LIMIT_SAFETY_MARGIN:-5}"
      ESI_RATE_LIMIT_MAX_WAIT_SECONDS: "${ESI_RATE_LIMIT_MAX_WAIT_SECONDS:-5}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/app:/var/www/html
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/php/conf.d:/usr/local/etc/php/conf.d/aegiscore:ro
      # Read-only mount of the repo's pinned SDE version marker. The daily
      # `reference:check-sde-version` command reads /var/www/sde/version.txt
      # and compares it against upstream.
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/infra/sde:/var/www/sde:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [aegiscore]

  scheduler:
    # Laravel task scheduler. `schedule:work` is a long-running process that
    # internally runs `schedule:run` once a minute — no host cron required.
    # Scheduled tasks (e.g. `reference:check-sde-version` in routes/console.php)
    # dispatch `ShouldQueue` jobs onto Redis; the `horizon` service below
    # actually consumes and runs them. The scheduler itself is a clock, not
    # a worker.
    <<: *php-common
    container_name: scheduler
    # Inherits php-fpm's entrypoint (which chowns storage/ + bootstrap/cache
    # then execs whatever the container CMD is). No fpm listener, so drop the
    # healthcheck — the container either runs schedule:work or it doesn't.
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true

  horizon:
    # Laravel Horizon queue supervisor — the actual worker. Manages the
    # processes that consume `ShouldQueue` jobs from Redis (e.g.
    # `CheckSdeVersion` dispatched by the scheduler). Without this
    # container, dispatched jobs accumulate in Redis forever and
    # /horizon renders `Status: Inactive / Total Processes: 0`.
    #
    # Worker topology (queues, process counts, balancing strategy) lives
    # in `config/horizon.php` — see the docblock there for the
    # APP_ENV ↔ supervisor-key mapping. DO NOT rely on the package's
    # vendored defaults: they only declare supervisors for APP_ENV
    # values `production` and `local`, which don't match our
    # AEGISCORE_ENV values (`dev` / `staging` / `prod`) and result in
    # a running-but-empty master that spawns zero workers.
    #
    # After code or config changes, `make restart` recycles this
    # container so workers pick up fresh class definitions — Horizon
    # gracefully drains in-flight jobs on SIGTERM before exit.
    <<: *php-common
    container_name: horizon
    command: ["php", "artisan", "horizon"]
    # `horizon:status` reports whether the master is alive, exiting
    # non-zero when paused or stopped. Note: it ONLY checks the master
    # — an empty supervisor list (zero workers) still counts as
    # "running" because the master process itself is fine. That
    # failure mode is prevented at config time instead (see
    # config/horizon.php — every APP_ENV we use has a supervisor
    # spec). Docker's healthcheck is a liveness probe, not a
    # correctness oracle.
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # sde_importer — one-shot Python job that downloads CCP's EVE SDE JSONL zip,
  # truncates + reloads the ref_* MariaDB tables inside a single transaction,
  # and emits a `reference.sde_snapshot_loaded` outbox event for Laravel to
  # relay. Kept in a `tools` compose profile so `docker compose up` doesn't
  # launch it — it runs on demand via `make sde-import` (docker compose run
  # --rm --profile tools sde_importer).
  #
  # Why Python and not a Laravel job: the SDE import is ~664k rows across
  # 56 files in a single transaction (ADR-0001 §4). That breaks the plane
  # boundary policy for Laravel queue jobs (<2s / <100 rows). Python +
  # pymysql gives us one connection, one BEGIN/COMMIT, and streaming JSONL
  # parsing without pulling the whole SDE into memory.
  sde_importer:
    build:
      context: ../python
      dockerfile: Dockerfile
    image: aegiscore/sde-importer:0.1.0
    container_name: sde_importer
    profiles: [tools]
    # Host UID 1000 so the file written to infra/sde/version.txt is
    # readable+writable from the host without a chown dance.
    user: "1000:1000"
    environment:
      # MariaDB (reuses the php-fpm convention so operators only remember
      # one set of env names).
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # SDE source + pinning. Override SDE_SOURCE_URL to point at a
      # cached mirror during air-gapped imports.
      SDE_SOURCE_URL: "${SDE_SOURCE_URL:-https://developers.eveonline.com/static-data/eve-online-static-data-latest-jsonl.zip}"
      SDE_VERSION_FILE: /var/www/sde/version.txt
      SDE_WORK_DIR: /tmp/sde
      SDE_DOWNLOAD_TIMEOUT: "${SDE_DOWNLOAD_TIMEOUT:-600}"
      SDE_BATCH_SIZE: "${SDE_BATCH_SIZE:-2000}"
    volumes:
      # Writable — the importer pins the new version here on success.
      # Note: php-fpm mounts the same path :ro so the drift check can
      # read it without risking a write collision.
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/infra/sde:/var/www/sde:rw
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  # graph_universe_sync — one-shot Python job that projects the SDE
  # universe topology (regions / constellations / systems / stargates /
  # NPC stations) from MariaDB ref_* tables into Neo4j. Sibling to
  # sde_importer; runs after `make sde-import` and before the map
  # renderer can serve graph-backed data.
  #
  # Phase 1: operator-triggered via `make neo4j-sync-universe`. Phase 2:
  # promote to a long-lived consumer of the
  # `reference.sde_snapshot_loaded` outbox event once the consumer
  # scaffolding lands. See ADR-0001.
  graph_universe_sync:
    build:
      context: ../python
      dockerfile: graph_universe_sync.Dockerfile
    image: aegiscore/graph-universe-sync:0.1.0
    container_name: graph_universe_sync
    profiles: [tools]
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"
      NEO4J_HOST: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      GRAPH_BATCH_SIZE: "${GRAPH_BATCH_SIZE:-2000}"
      NEW_EDEN_ONLY: "${GRAPH_NEW_EDEN_ONLY:-true}"
    depends_on:
      mariadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks: [aegiscore]

  # market_poller — one-shot Python job that walks enabled rows in
  # market_watched_locations, pulls current order books from ESI, and
  # bulk-inserts into market_orders. Emits one `market.orders_snapshot_ingested`
  # outbox event per successful location poll (consumed by the Python
  # relay → InfluxDB rollups + valuation recomputes in later rollout
  # steps).
  #
  # Phase 1 covers NPC stations only (region endpoint + location filter,
  # no auth). Admin-owned and donor-owned structure polling (auth'd via
  # eve_service_tokens / eve_market_tokens) layer on top in later rollout
  # steps of ADR-0004 without changing this service's shape.
  #
  # Cadence lives outside the container. The scheduled runner is the
  # `scheduler` container (Laravel's schedule:work), wired in
  # routes/console.php as a cron entry that dispatches this service via
  # `docker compose run --rm`. For operator one-shots use
  # `make market-poll`.
  market_poller:
    build:
      context: ../python
      dockerfile: market_poller.Dockerfile
    image: aegiscore/market-poller:0.1.1
    container_name: market_poller
    profiles: [tools]
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # ESI connection details — reuses the same env names the PHP
      # plane uses for light-sync calls so operators only remember one
      # set. The "proper" Python ESI client with full rate-limit /
      # refresh / JWT-verify logic is still ADR-0002 phase-2 #12
      # territory; this is the first concrete caller.
      ESI_BASE_URL: "${ESI_BASE_URL:-https://esi.evetech.net/latest}"
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"
      ESI_TIMEOUT_SECONDS: "${ESI_TIMEOUT_SECONDS:-15}"

      # Failure + rate-limit discipline. Defaults match the docstring
      # on market_poller/config.py; tune per deployment only if an
      # operator has a reason.
      MARKET_POLL_RATE_LIMIT_SAFETY_MARGIN: "${MARKET_POLL_RATE_LIMIT_SAFETY_MARGIN:-5}"
      MARKET_POLL_ERROR_LIMIT_SAFETY_MARGIN: "${MARKET_POLL_ERROR_LIMIT_SAFETY_MARGIN:-10}"
      MARKET_POLL_MAX_CONSECUTIVE_403S: "${MARKET_POLL_MAX_CONSECUTIVE_403S:-3}"
      MARKET_POLL_MAX_CONSECUTIVE_5XX: "${MARKET_POLL_MAX_CONSECUTIVE_5XX:-5}"
      MARKET_POLL_BATCH_SIZE: "${MARKET_POLL_BATCH_SIZE:-5000}"

      # Auth surface for admin-owned structure polling (ADR-0004 step 4).
      # APP_KEY is the Laravel encryption key — required so the Python
      # plane can decrypt the eve_service_tokens row the Laravel
      # `/admin/eve-service-character` flow wrote, and re-encrypt the
      # rotated refresh_token back into it. EVE_SSO_CLIENT_ID / SECRET
      # are the same CCP app credentials the Laravel plane uses; we
      # need them to hit POST /v2/oauth/token for refreshes.
      #
      # Empty values are fine on a stack that doesn't poll player
      # structures yet — the runner skips player_structure rows with
      # a log line rather than erroring out.
      APP_KEY: "${APP_KEY:-}"
      EVE_SSO_CLIENT_ID: "${EVE_SSO_CLIENT_ID:-}"
      EVE_SSO_CLIENT_SECRET: "${EVE_SSO_CLIENT_SECRET:-}"
      EVE_SSO_TOKEN_URL: "${EVE_SSO_TOKEN_URL:-https://login.eveonline.com/v2/oauth/token}"
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  # market_importer — one-shot Python job that pulls EVE Ref's daily
  # market-history CSV dumps from data.everef.net, reconciles them
  # against the local `market_history` table via totals.json, and
  # bulk-upserts every missing or partial day. Emits one
  # `market.history_snapshot_loaded` outbox event per imported day.
  #
  # Run cadence: once per day after EVE Ref's scrape job publishes
  # (they update throughout the day, so a 30-minute cadence also
  # works — the reconcile check skips already-complete days cheaply).
  # Phase 1 uses `make market-import`; schedule integration is the
  # same pattern as market_poller (Laravel scheduler shells out).
  market_importer:
    build:
      context: ../python
      dockerfile: market_importer.Dockerfile
    image: aegiscore/market-importer:0.1.1
    container_name: market_importer
    profiles: [tools]
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # EVE Ref source. Override base URL only if pointing at a mirror
      # (none published as of this writing — data.everef.net is the
      # only upstream). The user-agent follows the same convention as
      # ESI_USER_AGENT so AegisCore traffic is identifiable to their
      # operator.
      EVEREF_BASE_URL: "${EVEREF_BASE_URL:-https://data.everef.net/market-history}"
      EVEREF_TOTALS_URL: "${EVEREF_TOTALS_URL:-https://data.everef.net/market-history/totals.json}"
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"

      # Import window + tuning. MARKET_IMPORT_MIN_DATE defaults to
      # 2025-01-01 per ADR-0004 ("from 2025 forward"); pre-2025 history
      # available from EVE Ref if an operator wants it.
      MARKET_IMPORT_MIN_DATE: "${MARKET_IMPORT_MIN_DATE:-2025-01-01}"
      MARKET_IMPORT_MAX_DATE: "${MARKET_IMPORT_MAX_DATE:-}"
      MARKET_IMPORT_BATCH_SIZE: "${MARKET_IMPORT_BATCH_SIZE:-5000}"
      MARKET_IMPORT_DOWNLOAD_TIMEOUT: "${MARKET_IMPORT_DOWNLOAD_TIMEOUT:-600}"
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  # market_poll_scheduler — long-lived version of market_poller that
  # loops every MARKET_POLL_INTERVAL_SECONDS (default 300 = 5 min,
  # matching CCP's /markets/{region_id}/orders/ cache window). Runs
  # out-of-the-box with `docker compose up` — NOT under the `tools`
  # profile.
  #
  # Same image + env as the one-shot `market_poller` service above;
  # the only difference is this one hands the CLI `--interval 300`
  # on every startup. `restart: unless-stopped` handles crashes
  # without the cron-sidecar complexity of bind-mounting the docker
  # socket into a scheduler container.
  #
  # Operators keep `make market-poll` for ad-hoc one-shots (still
  # routed through the tools-profile `market_poller` service so it
  # spawns a separate transient container; no risk of double-polling
  # since the one-shot only runs when explicitly triggered).
  market_poll_scheduler:
    build:
      context: ../python
      dockerfile: market_poller.Dockerfile
    image: aegiscore/market-poller:0.1.1
    container_name: market_poll_scheduler
    restart: unless-stopped
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      ESI_BASE_URL: "${ESI_BASE_URL:-https://esi.evetech.net/latest}"
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"
      ESI_TIMEOUT_SECONDS: "${ESI_TIMEOUT_SECONDS:-15}"

      MARKET_POLL_RATE_LIMIT_SAFETY_MARGIN: "${MARKET_POLL_RATE_LIMIT_SAFETY_MARGIN:-5}"
      MARKET_POLL_ERROR_LIMIT_SAFETY_MARGIN: "${MARKET_POLL_ERROR_LIMIT_SAFETY_MARGIN:-10}"
      MARKET_POLL_MAX_CONSECUTIVE_403S: "${MARKET_POLL_MAX_CONSECUTIVE_403S:-3}"
      MARKET_POLL_MAX_CONSECUTIVE_5XX: "${MARKET_POLL_MAX_CONSECUTIVE_5XX:-5}"
      MARKET_POLL_BATCH_SIZE: "${MARKET_POLL_BATCH_SIZE:-5000}"

      APP_KEY: "${APP_KEY:-}"
      EVE_SSO_CLIENT_ID: "${EVE_SSO_CLIENT_ID:-}"
      EVE_SSO_CLIENT_SECRET: "${EVE_SSO_CLIENT_SECRET:-}"
      EVE_SSO_TOKEN_URL: "${EVE_SSO_TOKEN_URL:-https://login.eveonline.com/v2/oauth/token}"
    # Override the Dockerfile ENTRYPOINT's argv with the --interval
    # flag so this container loops instead of one-shot-exits. The
    # interval value is env-tunable for operators who want a
    # different cadence without editing compose.
    command: ["--interval", "${MARKET_POLL_INTERVAL_SECONDS:-300}"]
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  # market_import_scheduler — long-lived version of market_importer
  # that loops every MARKET_IMPORT_INTERVAL_SECONDS (default 21600 =
  # 6 hours). EVE Ref publishes their daily CSV archive once per day
  # but updates it throughout the day as their ESI scrape completes;
  # 6h cadence catches those updates without hammering their server.
  #
  # The reconcile check skips already-complete days cheaply, so the
  # steady-state cost of a scheduled pass is one totals.json fetch
  # plus a `COUNT(*) GROUP BY trade_date` + exit — measured in
  # milliseconds when there's nothing new to import.
  #
  # `make market-import` with MARKET_IMPORT_ARGS overrides stays
  # available for ad-hoc imports (custom --from / --to ranges,
  # --force-redownload, etc.).
  market_import_scheduler:
    build:
      context: ../python
      dockerfile: market_importer.Dockerfile
    image: aegiscore/market-importer:0.1.1
    container_name: market_import_scheduler
    restart: unless-stopped
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      EVEREF_BASE_URL: "${EVEREF_BASE_URL:-https://data.everef.net/market-history}"
      EVEREF_TOTALS_URL: "${EVEREF_TOTALS_URL:-https://data.everef.net/market-history/totals.json}"
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"

      MARKET_IMPORT_MIN_DATE: "${MARKET_IMPORT_MIN_DATE:-2025-01-01}"
      MARKET_IMPORT_MAX_DATE: "${MARKET_IMPORT_MAX_DATE:-}"
      MARKET_IMPORT_BATCH_SIZE: "${MARKET_IMPORT_BATCH_SIZE:-5000}"
      MARKET_IMPORT_DOWNLOAD_TIMEOUT: "${MARKET_IMPORT_DOWNLOAD_TIMEOUT:-600}"
    command: ["--interval", "${MARKET_IMPORT_INTERVAL_SECONDS:-21600}"]
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  # outbox_relay — long-lived consumer of the MariaDB `outbox` table.
  # Routes `market.*` events to typed projectors that write derived
  # series to InfluxDB. Per ADR-0003 § InfluxDB: derived store, Python
  # writes, no canonical ownership — InfluxDB can be dropped + rebuilt
  # from MariaDB at any time.
  #
  # Phase-1 routing surface (see python/outbox_relay/projectors/dispatch.py):
  #
  #   market.history_snapshot_loaded   → measurement `market_history`
  #   market.orders_snapshot_ingested  → measurement `market_orderbook`
  #
  # Unknown event_types are LEFT IN PLACE (not marked processed) so a
  # future projector deployment can pick them up. The relay's claim
  # WHERE filters on the registered event types only.
  #
  # Failure handling: a projector that throws bumps `attempts` +
  # records `last_error` on the outbox row but does NOT mark
  # processed. After OUTBOX_RELAY_MAX_ATTEMPTS the row stops being
  # claimed (parked as a dead letter). Operator resets attempts to
  # 0 to retry — typical recovery after fixing a projector bug.
  #
  # `make outbox-relay` runs a one-shot drain via the tools profile
  # (separate transient container); useful for "process the backlog
  # now" or testing a projector change.
  outbox_relay:
    build:
      context: ../python
      dockerfile: outbox_relay.Dockerfile
    image: aegiscore/outbox-relay:0.1.0
    container_name: outbox_relay
    restart: unless-stopped
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # InfluxDB sink. Token must have write access to BUCKET in ORG.
      INFLUXDB_HOST: "http://influxdb2:8086"
      INFLUXDB_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      INFLUXDB_ORG: "${INFLUXDB_ORG:-aegiscore}"
      INFLUXDB_BUCKET: "${INFLUXDB_BUCKET:-primary}"

      # Relay-loop knobs. Defaults match the docstring on
      # outbox_relay/config.py; tune per deployment only if needed.
      OUTBOX_RELAY_BATCH_SIZE: "${OUTBOX_RELAY_BATCH_SIZE:-50}"
      OUTBOX_RELAY_MAX_ATTEMPTS: "${OUTBOX_RELAY_MAX_ATTEMPTS:-5}"
      OUTBOX_RELAY_POLL_INTERVAL_SECONDS: "${OUTBOX_RELAY_POLL_INTERVAL_SECONDS:-5}"
    command: ["--interval", "${OUTBOX_RELAY_POLL_INTERVAL_SECONDS:-5}"]
    depends_on:
      mariadb:
        condition: service_healthy
      influxdb2:
        condition: service_healthy
    networks: [aegiscore]

  # outbox_relay_oneshot — sibling under the `tools` profile that
  # runs `python -m outbox_relay` with no --interval (drain-once
  # mode). Triggered by `make outbox-relay` for ad-hoc backlog
  # processing or projector-change testing without restarting the
  # long-lived service.
  outbox_relay_oneshot:
    build:
      context: ../python
      dockerfile: outbox_relay.Dockerfile
    image: aegiscore/outbox-relay:0.1.0
    container_name: outbox_relay_oneshot
    profiles: [tools]
    user: "1000:1000"
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"
      INFLUXDB_HOST: "http://influxdb2:8086"
      INFLUXDB_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      INFLUXDB_ORG: "${INFLUXDB_ORG:-aegiscore}"
      INFLUXDB_BUCKET: "${INFLUXDB_BUCKET:-primary}"
      OUTBOX_RELAY_BATCH_SIZE: "${OUTBOX_RELAY_BATCH_SIZE:-50}"
      OUTBOX_RELAY_MAX_ATTEMPTS: "${OUTBOX_RELAY_MAX_ATTEMPTS:-5}"
    depends_on:
      mariadb:
        condition: service_healthy
      influxdb2:
        condition: service_healthy
    networks: [aegiscore]

  # docker_socket_proxy — tecnativa/docker-socket-proxy sitting in front of
  # /var/run/docker.sock. PHP (and anything else on the `aegiscore` network)
  # gets a scoped read-only slice of the Docker API to drive the
  # /admin/container-status monitoring page.
  #
  # Why a proxy instead of mounting the socket into php-fpm directly: the
  # bare socket is effectively root-on-host (EXEC /containers/<id>/exec can
  # launch a privileged container, POST /containers/create can bind-mount
  # the host filesystem read-write). The proxy strips every POST path by
  # default and only re-enables the exact verbs we list here. PHP can read
  # container state and nothing else.
  #
  # Default listen port is 2375; we keep it bound to the internal compose
  # network (no `ports:` mapping — only reachable from peer services).
  #
  # Empty DOCKER_API_HOST env on the PHP side disables the admin page
  # entirely (DockerStatusService short-circuits), so operators who don't
  # want to expose even a read-only socket can just leave this service
  # off and the page renders a "not configured" notice.
  docker_socket_proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker_socket_proxy
    restart: unless-stopped
    environment:
      # Read verbs we need for the status page. Everything not listed
      # here is 403 at the proxy.
      CONTAINERS: 1
      INFO: 1
      VERSION: 1
      # Hard-deny writes + anything that can reach host resources or
      # other containers' internals. Defaults are already 0 but listing
      # them makes the policy self-documenting for operators reviewing
      # the compose file.
      POST: 0
      EXEC: 0
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      SWARM: 0
      SECRETS: 0
      BUILD: 0
    volumes:
      # Read-only mount — the proxy itself is also pinned to GET-only
      # via the env flags above, but belt-and-braces.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # No healthcheck — the image ships none by default and adding our
    # own would require bolting curl into a 20MB haproxy container.
    # Liveness is implicit: if the proxy dies, the status page renders
    # a single DOWN card and the rest of the admin keeps working.
    networks: [aegiscore]

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/nginx/certs:/etc/nginx/certs:ro
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/nginx/logs:/var/log/nginx
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/app:/var/www/html:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      opensearch-dashboards:
        condition: service_started
      influxdb2:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) — busybox wget resolves localhost to
      # IPv6 ::1, and nginx binds to 0.0.0.0 by default. Hitting ::1 returns
      # "Connection refused" and the container is marked unhealthy even
      # though it's serving IPv4 traffic fine. See `listen [::]:80` in
      # nginx/conf.d/aegiscore.conf for belt-and-braces IPv6 coverage.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [aegiscore]

networks:
  aegiscore:
    driver: bridge
