name: aegiscore-stack

services:
  mariadb:
    image: mariadb:lts
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD}"
      MARIADB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      MARIADB_USER: "${MARIADB_USER:-aegiscore}"
      MARIADB_PASSWORD: "${MARIADB_PASSWORD}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/data:/var/lib/mysql
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/config:/etc/mysql/conf.d
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/mariadb/logs:/var/log/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [aegiscore]

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      cluster.name: opensearch-cluster
      node.name: opensearch-node1
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Security plugin off for phase 1: OpenSearch is only reachable on the
      # internal `aegiscore` network (host port 9200 is dev-only). The demo
      # config's self-signed TLS breaks APOC→OpenSearch calls from Neo4j and
      # adds friction with no matching security gain inside the compose net.
      # Put OpenSearch behind nginx + mTLS (or re-enable the plugin) in prod.
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/opensearch/data:/usr/share/opensearch/data
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/opensearch/logs:/usr/share/opensearch/logs
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fs http://localhost:9200/_cluster/health || exit 1"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks: [aegiscore]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    environment:
      # Mirror the opensearch service: no security plugin, plain HTTP.
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks: [aegiscore]

  influxdb2:
    image: influxdb:2.7
    container_name: influxdb2
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_USERNAME}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG:-aegiscore}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET:-primary}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/influxdb2/data:/var/lib/influxdb2
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/influxdb2/config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [aegiscore]

  neo4j:
    image: neo4j:2026.03-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc","graph-data-science","apoc-extended"]'
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INIT:-2G}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-2G}"
      NEO4J_dbms_memory_transaction_total_max: "${NEO4J_TX_TOTAL_MAX:-2G}"
      NEO4J_db_memory_transaction_max: "${NEO4J_TX_MAX:-512M}"
      NEO4J_gds_validate__using__max__memory__estimation: "true"
      NEO4J_gds_progress__tracking__enabled: "true"
      NEO4J_db_transaction_timeout: "600s"
      NEO4J_server_bolt_thread__pool__min__size: "4"
      NEO4J_server_bolt_thread__pool__max__size: "16"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/data:/data
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/logs:/logs
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/import:/import
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks: [aegiscore]

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    command:
      - "sh"
      - "-c"
      - 'exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru'
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/redis/data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping 2>/dev/null | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [aegiscore]

  # Shared config for PHP containers (php-fpm + scheduler). YAML anchor lives
  # on php-fpm; scheduler merges it with `<<: *php-common`. Any new PHP-side
  # worker (future Horizon container, queue isolation, etc.) merges the same
  # anchor so env + volumes can't drift between planes by accident.
  php-fpm: &php-common
    image: aegiscore/php-fpm:0.1.1
    build:
      context: ./php
      dockerfile: Dockerfile
    # Always build locally; never try to pull from a registry. This image
    # does not exist on Docker Hub — it's assembled from infra/php/Dockerfile.
    pull_policy: build
    container_name: php-fpm
    restart: unless-stopped
    environment:
      # Exposed to PHP via getenv() / $_ENV; keep this list intentional.
      # ---------------------------------------------------------------
      # Laravel core
      # ---------------------------------------------------------------
      APP_NAME: AegisCore
      APP_ENV: "${AEGISCORE_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: info

      # Mirror for non-Laravel code (config/aegiscore.php).
      AEGISCORE_ENV: "${AEGISCORE_ENV:-dev}"

      # ---------------------------------------------------------------
      # MariaDB (Laravel DB_* convention, sourced from infra MARIADB_*)
      # ---------------------------------------------------------------
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # ---------------------------------------------------------------
      # Redis (Laravel cache / sessions / queues / Horizon)
      # ---------------------------------------------------------------
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis

      # ---------------------------------------------------------------
      # Derived stores (our conventions, read via config/aegiscore.php)
      # ---------------------------------------------------------------
      # Security plugin disabled on the opensearch service — no auth, HTTP only.
      OPENSEARCH_HOST: "http://opensearch:9200"
      INFLUXDB_HOST: "http://influxdb2:8086"
      INFLUXDB_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      INFLUXDB_ORG: "${INFLUXDB_ORG:-aegiscore}"
      INFLUXDB_BUCKET: "${INFLUXDB_BUCKET:-primary}"
      NEO4J_HOST: "bolt://neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"

      # ---------------------------------------------------------------
      # EVE SSO — login.eveonline.com OAuth2 PKCE
      # ---------------------------------------------------------------
      # Read by config/eve.php → consumed by App\Services\Eve\Sso\EveSsoClient.
      # When client_id / secret / callback_url are all present, the "Log in
      # with EVE Online" button renders on the landing page + Filament admin
      # login form + admin user menu. Empty values hide the button entirely
      # (EveSsoClient::isConfigured() returns false), which is the correct
      # behaviour for fresh installs that haven't registered an EVE app yet.
      EVE_SSO_CLIENT_ID: "${EVE_SSO_CLIENT_ID:-}"
      EVE_SSO_CLIENT_SECRET: "${EVE_SSO_CLIENT_SECRET:-}"
      EVE_SSO_CALLBACK_URL: "${EVE_SSO_CALLBACK_URL:-}"
      EVE_SSO_LOGIN_SCOPES: "${EVE_SSO_LOGIN_SCOPES:-publicData}"
      # Service character SSO scopes — the elevated set the admin grants
      # via /admin/eve-service-character. Default in config/eve.php; see
      # .env.example for the expanded form. Empty disables the flow.
      EVE_SSO_SERVICE_SCOPES: "${EVE_SSO_SERVICE_SCOPES:-}"
      # Comma-separated EVE character IDs that get Filament /admin access.
      # IDs (not names) — names are mutable, IDs are not. See ADR-0002.
      EVE_SSO_ADMIN_CHARACTER_IDS: "${EVE_SSO_ADMIN_CHARACTER_IDS:-}"
      # Donations character (third SSO flow) — single in-game character
      # that receives ISK donations. The poller hits its wallet journal
      # on EVE_DONATIONS_POLL_CRON cadence and records player_donation
      # entries. Empty CHARACTER_ID disables both the SSO flow + the
      # poller. See ADR-0002 § phase-2 amendment + .env.example.
      EVE_SSO_DONATIONS_CHARACTER_ID: "${EVE_SSO_DONATIONS_CHARACTER_ID:-}"
      EVE_SSO_DONATIONS_CHARACTER_NAME: "${EVE_SSO_DONATIONS_CHARACTER_NAME:-}"
      EVE_SSO_DONATIONS_SCOPES: "${EVE_SSO_DONATIONS_SCOPES:-esi-wallet.read_character_wallet.v1}"
      EVE_DONATIONS_POLL_CRON: "${EVE_DONATIONS_POLL_CRON:-*/5 * * * *}"

      # ---------------------------------------------------------------
      # ESI — esi.evetech.net (light synchronous calls only on this plane)
      # ---------------------------------------------------------------
      # CCP requires a User-Agent identifying app + contact. Reactive
      # rate-limit throttle (App\Services\Eve\Esi\EsiRateLimiter) reads
      # the safety_margin / max_wait knobs; defaults match config/eve.php.
      ESI_USER_AGENT: "${ESI_USER_AGENT:-AegisCore/0.1 (+ops@example.com)}"
      ESI_TIMEOUT_SECONDS: "${ESI_TIMEOUT_SECONDS:-10}"
      ESI_RATE_LIMIT_SAFETY_MARGIN: "${ESI_RATE_LIMIT_SAFETY_MARGIN:-5}"
      ESI_RATE_LIMIT_MAX_WAIT_SECONDS: "${ESI_RATE_LIMIT_MAX_WAIT_SECONDS:-5}"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/app:/var/www/html
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/php/conf.d:/usr/local/etc/php/conf.d/aegiscore:ro
      # Read-only mount of the repo's pinned SDE version marker. The daily
      # `reference:check-sde-version` command reads /var/www/sde/version.txt
      # and compares it against upstream.
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/infra/sde:/var/www/sde:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [aegiscore]

  scheduler:
    # Laravel task scheduler. `schedule:work` is a long-running process that
    # internally runs `schedule:run` once a minute — no host cron required.
    # Scheduled tasks (e.g. `reference:check-sde-version` in routes/console.php)
    # dispatch `ShouldQueue` jobs onto Redis; the `horizon` service below
    # actually consumes and runs them. The scheduler itself is a clock, not
    # a worker.
    <<: *php-common
    container_name: scheduler
    # Inherits php-fpm's entrypoint (which chowns storage/ + bootstrap/cache
    # then execs whatever the container CMD is). No fpm listener, so drop the
    # healthcheck — the container either runs schedule:work or it doesn't.
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true

  horizon:
    # Laravel Horizon queue supervisor — the actual worker. Manages the
    # processes that consume `ShouldQueue` jobs from Redis (e.g.
    # `CheckSdeVersion` dispatched by the scheduler). Without this
    # container, dispatched jobs accumulate in Redis forever and
    # /horizon renders `Status: Inactive / Total Processes: 0`.
    #
    # Worker topology (queues, process counts, balancing strategy) lives
    # in `config/horizon.php`; vendor defaults apply if not published.
    # After code changes, `make restart` recycles this container so
    # workers pick up fresh class definitions — Horizon gracefully
    # drains in-flight jobs on SIGTERM before exit.
    <<: *php-common
    container_name: horizon
    command: ["php", "artisan", "horizon"]
    # horizon:status exits 0 when the supervisor is running (or paused)
    # and non-zero when inactive — good enough as a liveness probe.
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # sde_importer — one-shot Python job that downloads CCP's EVE SDE JSONL zip,
  # truncates + reloads the ref_* MariaDB tables inside a single transaction,
  # and emits a `reference.sde_snapshot_loaded` outbox event for Laravel to
  # relay. Kept in a `tools` compose profile so `docker compose up` doesn't
  # launch it — it runs on demand via `make sde-import` (docker compose run
  # --rm --profile tools sde_importer).
  #
  # Why Python and not a Laravel job: the SDE import is ~664k rows across
  # 56 files in a single transaction (ADR-0001 §4). That breaks the plane
  # boundary policy for Laravel queue jobs (<2s / <100 rows). Python +
  # pymysql gives us one connection, one BEGIN/COMMIT, and streaming JSONL
  # parsing without pulling the whole SDE into memory.
  sde_importer:
    build:
      context: ../python
      dockerfile: Dockerfile
    image: aegiscore/sde-importer:0.1.0
    container_name: sde_importer
    profiles: [tools]
    # Host UID 1000 so the file written to infra/sde/version.txt is
    # readable+writable from the host without a chown dance.
    user: "1000:1000"
    environment:
      # MariaDB (reuses the php-fpm convention so operators only remember
      # one set of env names).
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${MARIADB_DATABASE:-aegiscore}"
      DB_USERNAME: "${MARIADB_USER:-aegiscore}"
      DB_PASSWORD: "${MARIADB_PASSWORD}"

      # SDE source + pinning. Override SDE_SOURCE_URL to point at a
      # cached mirror during air-gapped imports.
      SDE_SOURCE_URL: "${SDE_SOURCE_URL:-https://developers.eveonline.com/static-data/eve-online-static-data-latest-jsonl.zip}"
      SDE_VERSION_FILE: /var/www/sde/version.txt
      SDE_WORK_DIR: /tmp/sde
      SDE_DOWNLOAD_TIMEOUT: "${SDE_DOWNLOAD_TIMEOUT:-600}"
      SDE_BATCH_SIZE: "${SDE_BATCH_SIZE:-2000}"
    volumes:
      # Writable — the importer pins the new version here on success.
      # Note: php-fpm mounts the same path :ro so the drift check can
      # read it without risking a write collision.
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/infra/sde:/var/www/sde:rw
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [aegiscore]

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/nginx/certs:/etc/nginx/certs:ro
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/docker/nginx/logs:/var/log/nginx
      - ${AEGISCORE_ROOT:-/opt/aegiscore}/app:/var/www/html:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      opensearch-dashboards:
        condition: service_started
      influxdb2:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) — busybox wget resolves localhost to
      # IPv6 ::1, and nginx binds to 0.0.0.0 by default. Hitting ::1 returns
      # "Connection refused" and the container is marked unhealthy even
      # though it's serving IPv4 traffic fine. See `listen [::]:80` in
      # nginx/conf.d/aegiscore.conf for belt-and-braces IPv6 coverage.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [aegiscore]

networks:
  aegiscore:
    driver: bridge
